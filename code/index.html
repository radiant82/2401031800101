<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Personal Finance Tracker</title>
    <meta
      name="description"
      content="Track your personal expenses and budget with a sleek, modern finance dashboard."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <nav class="app-nav">
      <div class="nav-brand">
        <span class="brand-name">FinanceFlow</span>
      </div>
      <div class="nav-actions">
        <span id="currentMonthLabel" class="month-label"></span>
      </div>
    </nav>

    <div class="stats-band">
      <div class="stat-card" id="statTotal">
        <div class="stat-icon stat-icon--spent">
          <i class="bi bi-arrow-up-circle-fill"></i>
        </div>
        <div class="stat-body">
          <span class="stat-label">Spent This Month</span>
          <span class="stat-value" id="totalThisMonth">₹0.00</span>
        </div>
      </div>

      <div class="stat-card" id="statBudget">
        <div class="stat-icon stat-icon--budget">
          <i class="bi bi-piggy-bank-fill"></i>
        </div>
        <div class="stat-body">
          <span class="stat-label">Monthly Budget</span>
          <span class="stat-value" id="budgetDisplay">₹0.00</span>
        </div>
      </div>

      <div class="stat-card" id="statRemaining">
        <div class="stat-icon stat-icon--remaining">
          <i class="bi bi-wallet-fill"></i>
        </div>
        <div class="stat-body">
          <span class="stat-label">Remaining</span>
          <span class="stat-value" id="remainingDisplay">₹0.00</span>
        </div>
      </div>

      <div class="stat-card" id="statCount">
        <div class="stat-icon stat-icon--count">
          <i class="bi bi-receipt"></i>
        </div>
        <div class="stat-body">
          <span class="stat-label">Transactions</span>
          <span class="stat-value" id="countThisMonth">0</span>
        </div>
      </div>
    </div>

    <main class="main-layout">
      <section class="panel panel--expenses">
        <div class="panel-header">
          <h2 class="panel-title">
            <i class="bi bi-list-ul me-2"></i>Expenses
          </h2>

          <div class="panel-controls">
            <div class="filter-wrap">
              <i class="bi bi-calendar3 filter-icon"></i>
              <input id="filterMonth" type="month" class="filter-input" />
            </div>
            <button
              type="button"
              id="openAddModalBtn"
              class="btn-add"
              data-bs-toggle="modal"
              data-bs-target="#addExpenseModal"
            >
              <i class="bi bi-plus-lg"></i> Add Expense
            </button>
          </div>
        </div>

        <div class="table-wrap">
          <table id="expensesTable">
            <thead>
              <tr>
                <th>Date</th>
                <th>Category</th>
                <th>Description</th>
                <th class="text-end">Amount</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="expensesTbody"></tbody>
          </table>
          <div id="emptyState" class="empty-state" style="display: none">
            <i class="bi bi-inbox display-4"></i>
            <p>
              No expenses this month.<br />Click <strong>Add Expense</strong> to
              get started.
            </p>
          </div>
        </div>
      </section>

      <aside class="sidebar">
        <div class="panel panel--budget">
          <div class="panel-header">
            <h2 class="panel-title">
              <i class="bi bi-sliders me-2"></i>Budget
            </h2>
          </div>
          <div class="budget-form">
            <label class="field-label" for="budgetInput"
              >Set Monthly Budget</label
            >
            <div class="budget-input-row">
              <span class="currency-symbol">₹</span>
              <input
                id="budgetInput"
                type="number"
                min="0"
                step="0.01"
                placeholder="0.00"
                class="budget-field"
              />
              <button type="button" id="saveBudget" class="btn-save">
                Save
              </button>
            </div>
          </div>

          <div class="progress-wrap">
            <div class="progress-header">
              <span class="progress-label">Budget Used</span>
              <span id="progressPct" class="progress-pct">0%</span>
            </div>
            <div class="progress-track">
              <div
                id="budgetProgress"
                class="progress-fill"
                style="width: 0%"
              ></div>
            </div>
            <small id="budgetText" class="progress-detail"></small>
          </div>
        </div>

        <div class="panel panel--chart">
          <div class="panel-header">
            <h2 class="panel-title">
              <i class="bi bi-pie-chart-fill me-2"></i>Breakdown
            </h2>
          </div>
          <div class="chart-container">
            <canvas id="expenseChart"></canvas>
            <div id="chartEmpty" class="chart-empty" style="display: none">
              <i class="bi bi-bar-chart-line"></i>
              <span>No data yet</span>
            </div>
          </div>
        </div>
      </aside>
    </main>
    <div
      class="modal fade"
      id="addExpenseModal"
      tabindex="-1"
      aria-labelledby="addExpenseModalLabel"
      aria-modal="true"
      role="dialog"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content app-modal">
          <div class="modal-header app-modal-header">
            <div class="modal-title-row">
              <h5 class="modal-title" id="addExpenseModalLabel">
                Add New Expense
              </h5>
            </div>
            <button
              type="button"
              class="modal-close-btn"
              data-bs-dismiss="modal"
              aria-label="Close"
            >
              <i class="bi bi-x-lg"></i>
            </button>
          </div>

          <div class="modal-body app-modal-body">
            <form id="expenseForm" novalidate>
              <div class="form-row-2">
                <div class="field-group">
                  <label class="field-label" for="expDate"
                    ><i class="bi bi-calendar-event me-1"></i>Date</label
                  >
                  <input type="date" id="expDate" class="app-input" required />
                </div>
                <div class="field-group">
                  <label class="field-label" for="expAmount"
                    ><i class="bi bi-currency-dollar me-1"></i>Amount</label
                  >
                  <input
                    type="number"
                    id="expAmount"
                    class="app-input"
                    step="0.01"
                    min="0.01"
                    placeholder="0.00"
                    required
                  />
                </div>
              </div>

              <div class="field-group">
                <label class="field-label" for="expCategory"
                  ><i class="bi bi-tag me-1"></i>Category</label
                >
                <select id="expCategory" class="app-select">
                  <option value="Food">🍔 Food</option>
                  <option value="Transport">🚗 Transport</option>
                  <option value="Rent">🏠 Rent</option>
                  <option value="Utilities">💡 Utilities</option>
                  <option value="Entertainment">🎮 Entertainment</option>
                  <option value="Health">🏥 Health</option>
                  <option value="Shopping">🛍️ Shopping</option>
                  <option value="Other">📦 Other</option>
                </select>
              </div>

              <div class="field-group">
                <label class="field-label" for="expDesc"
                  ><i class="bi bi-pencil me-1"></i>Description</label
                >
                <input
                  id="expDesc"
                  class="app-input"
                  placeholder="What was this for?"
                />
              </div>

              <div
                id="formError"
                class="form-error"
                style="display: none"
              ></div>
            </form>
          </div>

          <div class="modal-footer app-modal-footer">
            <button class="btn-cancel" data-bs-dismiss="modal">Cancel</button>
            <button type="button" id="saveExpenseBtn" class="btn-submit">
              <i class="bi bi-check-lg me-1"></i>Save Expense
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div id="appToast" class="app-toast" role="alert" aria-live="polite">
        <span id="toastMsg"></span>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <script src="js/script.js"></script>
  </body>
</html>
